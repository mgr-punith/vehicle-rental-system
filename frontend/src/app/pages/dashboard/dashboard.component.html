<section class="dashboard">
  <div class="page-header">
    <h2>Dashboard</h2>
    <p>Welcome to the admin panel.</p>
  </div>

  <div class="card-grid">
    @for (card of cards; track card.title) {
      <mat-card class="dashboard-card">
        <mat-card-content>
          <div class="card-top">
            <mat-icon>{{ card.icon }}</mat-icon>
            <h3>{{ card.title }}</h3>
          </div>
          <p>{{ card.value }}</p>
        </mat-card-content>
      </mat-card>
    }
  </div>
</section>
