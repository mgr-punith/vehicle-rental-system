<h2 mat-dialog-title>
  {{ data.mode === 'add' ? 'Add Vehicle' : 'Edit Vehicle' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="vehicle-form">
    <mat-form-field appearance="outline">
      <mat-label>Vehicle Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Brand</mat-label>
      <input matInput formControlName="brand" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Model</mat-label>
      <input matInput formControlName="model" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Registration Number</mat-label>
      <input matInput formControlName="registrationNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Vehicle Type</mat-label>
      <mat-select formControlName="vehicleType">
        @for (type of vehicleTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rent Per Day</mat-label>
      <input matInput type="number" formControlName="rentPerDay" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        @for (status of statusOptions; track status) {
          <mat-option [value]="status">{{ status }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Image URL</mat-label>
      <input matInput formControlName="image" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">
    {{ data.mode === 'add' ? 'Create' : 'Update' }}
  </button>
</mat-dialog-actions>
